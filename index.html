<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Tick Timer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: #0a0a0a;
    color: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .counter {
    font-variant-numeric: tabular-nums;
    font-weight: 200;
    font-size: clamp(8rem, 40vw, 24rem);
    line-height: 1;
    letter-spacing: -0.04em;
  }
  .controls {
    display: flex;
    gap: 1.5rem;
  }
  button {
    font: inherit;
    color: inherit;
    background: transparent;
    border: 1px solid #444;
    border-radius: 999px;
    padding: 0.9rem 2.2rem;
    font-size: 1.125rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    min-width: 7.5rem;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover { border-color: #888; }
  button:active { background: #1a1a1a; }
  button:focus-visible { outline: 2px solid #888; outline-offset: 2px; }
  .start { border-color: #f5f5f5; }
</style>
</head>
<body>
  <div class="counter" id="counter">0</div>
  <div class="controls">
    <button class="start" id="start" type="button">Start</button>
    <button class="reset" id="reset" type="button">Reset</button>
  </div>
<script>
  const counterEl = document.getElementById('counter');
  const startBtn = document.getElementById('start');
  const resetBtn = document.getElementById('reset');

  let running = false;
  let elapsedMs = 0;
  let startedAt = 0;
  let timeoutId = null;
  let audioCtx = null;
  let silentAudio = null;

  // iOS Safari の WebAudio は既定で "Ambient" 音声セッションに乗るため、
  // 物理スピーカーへの出力が抑制されることがある。無音 <audio> をループ再生して
  // セッションを "Playback" に昇格させると、tick 音が確実に鳴る。
  function makeSilentAudio() {
    const sr = 8000;
    const samples = 800; // 0.1s
    const buf = new ArrayBuffer(44 + samples);
    const v = new DataView(buf);
    const writeStr = (off, s) => {
      for (let i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i));
    };
    writeStr(0, 'RIFF');
    v.setUint32(4, 36 + samples, true);
    writeStr(8, 'WAVE');
    writeStr(12, 'fmt ');
    v.setUint32(16, 16, true);
    v.setUint16(20, 1, true);
    v.setUint16(22, 1, true);
    v.setUint32(24, sr, true);
    v.setUint32(28, sr, true);
    v.setUint16(32, 1, true);
    v.setUint16(34, 8, true);
    writeStr(36, 'data');
    v.setUint32(40, samples, true);
    for (let i = 0; i < samples; i++) v.setUint8(44 + i, 0x80);
    const blob = new Blob([buf], { type: 'audio/wav' });
    const audio = new Audio(URL.createObjectURL(blob));
    audio.loop = true;
    audio.playsInline = true;
    return audio;
  }

  function ensureAudio() {
    if (!audioCtx) {
      const Ctor = window.AudioContext || window.webkitAudioContext;
      if (!Ctor) return;
      audioCtx = new Ctor();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (!silentAudio) silentAudio = makeSilentAudio();
    silentAudio.play().catch(() => {});
  }

  function playTick() {
    ensureAudio();
    if (!audioCtx) return;
    const ctx = audioCtx;
    const now = ctx.currentTime;

    // クリック成分（短い高音バースト）
    const osc = ctx.createOscillator();
    const oscGain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(2400, now);
    osc.frequency.exponentialRampToValueAtTime(800, now + 0.015);
    oscGain.gain.setValueAtTime(0.0001, now);
    oscGain.gain.exponentialRampToValueAtTime(0.15, now + 0.001);
    oscGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);
    osc.connect(oscGain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.05);

    // ノイズ成分（質感を出す）
    const bufferSize = ctx.sampleRate * 0.03;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'highpass';
    noiseFilter.frequency.value = 1500;
    const noiseGain = ctx.createGain();
    noiseGain.gain.value = 0.08;
    noise.connect(noiseFilter).connect(noiseGain).connect(ctx.destination);
    noise.start(now);
  }

  function render(seconds) {
    counterEl.textContent = String(seconds);
  }

  function currentSeconds() {
    const now = performance.now();
    const total = elapsedMs + (running ? now - startedAt : 0);
    return Math.floor(total / 1000);
  }

  function scheduleNextTick() {
    const now = performance.now();
    const total = elapsedMs + (now - startedAt);
    const delay = 1000 - (total % 1000);
    timeoutId = setTimeout(onTick, delay);
  }

  function onTick() {
    if (!running) return;
    render(currentSeconds());
    playTick();
    scheduleNextTick();
  }

  function start() {
    if (running) return;
    ensureAudio();
    running = true;
    startedAt = performance.now();
    startBtn.textContent = 'Pause';
    scheduleNextTick();
  }

  function pause() {
    if (!running) return;
    elapsedMs += performance.now() - startedAt;
    running = false;
    if (timeoutId !== null) {
      clearTimeout(timeoutId);
      timeoutId = null;
    }
    if (silentAudio) silentAudio.pause();
    startBtn.textContent = 'Start';
    render(currentSeconds());
  }

  function reset() {
    running = false;
    elapsedMs = 0;
    startedAt = 0;
    if (timeoutId !== null) {
      clearTimeout(timeoutId);
      timeoutId = null;
    }
    if (silentAudio) silentAudio.pause();
    startBtn.textContent = 'Start';
    render(0);
  }

  startBtn.addEventListener('click', () => {
    if (running) pause(); else start();
  });
  resetBtn.addEventListener('click', reset);
</script>
</body>
</html>
